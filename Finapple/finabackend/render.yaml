services:
  - type: web
    name: finapple-backend
    runtime: node
    rootDir: Finapple/finabackend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false        # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false        # set manually in Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false        # set to your frontend URL, e.g. https://finapple.netlify.app
